<svg xmlns="http://www.w3.org/2000/svg" viewBox="-64 -64 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#00ccff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#0066ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0033aa" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="flash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#66ddff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#0088ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0044cc" stop-opacity="0.0"/>
    </radialGradient>
  </defs>
  <!-- 背景光晕 -->
  <circle cx="0" cy="0" r="60" fill="url(#bg)"/>
  <!-- 闪电裂纹 -->
  <g stroke="#66ddff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M0,-45 L8,-25 L-4,-25 L6,0 L-6,0 L4,25 L-8,25 L0,45"/>
    <path d="M-30,-30 L-18,-15 L-30,-5 L-15,10 L-25,20 L-10,35" opacity="0.6"/>
    <path d="M30,-30 L18,-15 L30,-5 L15,10 L25,20 L10,35" opacity="0.6"/>
    <path d="M-40,0 L-25,8 L-35,20 L-15,25" opacity="0.5" stroke-width="1.8"/>
    <path d="M40,0 L25,8 L35,20 L15,25" opacity="0.5" stroke-width="1.8"/>
    <path d="M0,-30 L-12,-10 L0,10 L-8,30" opacity="0.4" stroke-width="1.5"/>
    <path d="M-20,-40 L-8,-28 L-20,-18 L-5,-5" opacity="0.4" stroke-width="1.5"/>
    <path d="M20,-40 L8,-28 L20,-18 L5,-5" opacity="0.4" stroke-width="1.5"/>
  </g>
  <!-- 中心闪光 -->
  <circle cx="0" cy="0" r="10" fill="url(#flash)"/>
  <!-- 外圈波纹 -->
  <circle cx="0" cy="0" r="50" stroke="#0088ff" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="0" cy="0" r="55" stroke="#0066ff" stroke-width="0.5" fill="none" opacity="0.15"/>
</svg>
