<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100" height="80">
  <!-- 飞船主体 -->
  <polygon points="90,40 15,10 15,70" fill="#4A90D9" stroke="#2C3E50" stroke-width="2"/>
  
  <!-- 驾驶舱 -->
  <polygon points="75,40 45,30 45,50" fill="#85C1E9" stroke="#2C3E50" stroke-width="2"/>
  
  <!-- 机翼 - 上 -->
  <polygon points="30,12 10,5 15,25" fill="#E74C3C" stroke="#2C3E50" stroke-width="2"/>
  
  <!-- 机翼 - 下 -->
  <polygon points="30,68 10,75 15,55" fill="#E74C3C" stroke="#2C3E50" stroke-width="2"/>
  
  <!-- 引擎火焰 -->
  <polygon points="15,25 5,40 15,55 8,40" fill="#F1C40F" opacity="0.9"/>
  <polygon points="15,30 8,40 15,50 11,40" fill="#E67E22" opacity="0.7"/>
  
  <!-- 引擎喷口 -->
  <rect x="12" y="30" width="8" height="20" rx="2" fill="#7F8C8D" stroke="#2C3E50" stroke-width="1.5"/>
  
  <!-- 舷窗 -->
  <circle cx="55" cy="40" r="5" fill="#2C3E50"/>
  <circle cx="55" cy="40" r="3" fill="#AED6F1"/>
  
  <!-- 机翼上的装饰线条 -->
  <line x1="25" y1="15" x2="40" y2="30" stroke="#2C3E50" stroke-width="1.5" opacity="0.6"/>
  <line x1="25" y1="65" x2="40" y2="50" stroke="#2C3E50" stroke-width="1.5" opacity="0.6"/>
</svg>
